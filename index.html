<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="=UTF-8">
        <meta name="viewpport" content="width=device-width">
        <title>Weather App</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>WEATHER APP</h1>

            <form id="searchform">
                <input
                type="text"
                id="cityInput"
                placeholder="Enter city name..."
                required
                >
                <buttton type="submit">Search</buttton>
            </form>
            <div id="loading" class="hidden">Loading...</div>
            <div id="error" class="hidden"></div>

            <div id="weather" class="hidden">
                <h2 id="cityName"></h2>
                <p id="temp"></p>
                <p id="description"></p>
                <p id="details"></p>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
